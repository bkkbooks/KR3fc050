body:
  text: 十七爲積日不盡七十三爲小餘以六十去積日不盡一十七爲大餘命起戊午筭外得一月乙亥朔置一月朔大餘一十七小餘七十三加大餘一十四小餘七百一十九半得一月望大餘三十一小餘七百九十二半命如前得一月已丑望又置一月朔大餘一十七小餘七十三加大餘二十九小餘四百九十九得二月朔大餘四十六小餘五百七十二命如前得二月甲辰朔置二月朔大小餘加大餘一十四小餘七百一十九半得二月望大餘小餘三百五十一半命得二月已未望一月一日乙亥朔二月一日甲辰朔二日丙子二日乙巳三日丁丑三日丙午三月惟丙午朏四日戊寅四日丁未五日已卯五日戊申越三日戊申六日庚辰六日已酉七日辛巳七日庚戌越三日庚戌八日壬午八日辛亥九日癸未九日壬子十日甲申十日癸丑十一日乙酉十一日甲寅越五日甲寅
