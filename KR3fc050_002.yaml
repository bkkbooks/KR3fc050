body:
  text: 鄭注是時周公居攝五年二月三月當為一月二月不云正月者蓋待治定制禮乃正言正月故也江徵君聲王光祿鳴盛以為據洛誥十二月戊辰逆推之其說未核今案鄭君精於步算此破二月三月為一月二月以緯𠊱人蔀數推知上考下驗一一符合不僅檢勘一二年間月日也考之如左入戊午蔀二十九年歲在戊午是年文王得赤雀受命明年攺元中𠊱我應云季秋之月甲子案殷九月辛丑朔甲子二十四日也赤雀銜丹書入豐止于昌戶再拜稽首受案乾鑿度是年入天元二百七十五萬九千二百八十五歲以元法四千五百六十除去之餘四百八十五不滿紀法一千五百二十為入紀年以六十去之餘五命起甲寅算上得是年歲在戊午置入紀年四百八十五以蔀法七十六除之得積蔀六不盡二十九為入蔀年置積蔀六命甲子一癸卯二壬午三辛酉四庚子五已卯六算外得戊午蔀詩大明疏鄭注尚書文王受命武王伐紂時日皆用殷秝案殷術甲寅元此亦甲寅元故云用殷術然劉歆所說術周公六年始入戊午蔀實與此不同入蔀三十年已未文王受命元年
