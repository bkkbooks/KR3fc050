body:
  text: 入蔀三十一年申庚二年入蔀三十二年酉辛三年入蔀三十三年壬戌四年入蔀三十四年亥癸五年入蔀三十五年甲子六年入蔀三十六年乙丑七年王文崩文王年十五生武王九十七而終終時武王年八十三矣入蔀三十七年丙寅八年入蔀三十八年丁卯九年入蔀三十九年戊辰十年入蔀四十年已巳十一年書序云惟十有一年武王伐殷注云十有一年本文王受命而數之是年入戊午蔀四十歲矣是年武王頫取白魚入蔀四十一年庚午十二年入蔀四十二年辛未十三年書序武王克殷呂箕子歸作洪範洪範日惟十有三祀譜云以秝棱之文王受命十三年辛未之歲殷正月六日殺紂案是月已未朔六日甲子入蔀四十三年壬申入蔀四十四年癸酉金滕既克商二年王有疾
