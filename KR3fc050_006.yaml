body:
  text: 入蔀四十五年戌甲入蔀四十六年乙亥武王崩時年九十三成王年十歲入蔀四十七年子丙入蔀四十八年丁丑服喪三年畢成王年十二入蔀四十九年戌寅周公辟居東都成王年十三入蔀五十年已卯周公居東二年成王年十四入蔀五十一年庚辰成王年十五迎周公反居攝元年入蔀五十二年辛巳二年入蔀五十三年壬午三年入蔀五十四年癸未四年封康叔作康誥成王年十八稱孟矦入蔀五十五年甲申五年作召誥置入蔀年五十五減一餘五十四以章月二百三十五乘之得一萬二千六百九十如章歲十九而一得六百六十七為積月不盡一十七為閏餘是年閏四月置積月六百六十七以月法二萬七千七百五十九乘之得一千八百五十一萬五千二百五十三如日法九百四十而一得一萬九千六百九
